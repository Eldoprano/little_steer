# ── Generation settings ───────────────────────────────────────────────────────
generation:
  # How many prompts to process before writing results to disk.
  # vLLM handles its own internal batching — this only controls checkpoint
  # frequency for crash recovery. Larger = more efficient but less resumable.
  write_chunk_size: 20

  # Retries for responses where <think> never closes (incomplete reasoning).
  max_retries: 1

  # "sequential" — finish dataset1 fully, then dataset2, etc.
  # "interleaved" — round-robin one chunk per dataset per cycle.
  #                 Useful when testing across datasets simultaneously.
  run_mode: interleaved
