# ── Datasets ──────────────────────────────────────────────────────────────────
datasets:
  # - name: harmful
  #   source: hf
  #   path: declare-lab/CategoricalHarmfulQA
  #   subset: default
  #   split: en
  #   prompt_field: Question
  #   extra_fields: "*"

  # - name: harmbench
  #   source: hf
  #   path: walledai/HarmBench
  #   subset: standard
  #   split: train
  #   prompt_field: behavior
  #   extra_fields: "*"    # or e.g. [Category, SemanticCategory]

  - name: strong_reject
    source: hf
    path: walledai/StrongREJECT
    split: train
    prompt_field: prompt
    extra_fields: "*"    # save all other fields (category, source, etc.)

  - name: clear_harm
    source: hf
    path: AlignmentResearch/ClearHarm
    subset: default
    split: train
    prompt_field: content
    extra_fields: "*"

  - name: xs_test
    source: hf
    path: Paul/XSTest
    split: train
    prompt_field: prompt
    extra_fields: "*"

  - name: lima
    source: hf
    path: llamafactory/lima
    split: train
    prompt_field: conversations
    prompt_index: 0          # Grab the first element of the list as the prompt
    extra_fields: "*"

  # ── local dataset example ─────────────────────────────────────────────────
