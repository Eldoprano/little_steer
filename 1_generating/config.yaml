  - name: phi-4-reasoning-14B
    backend: openai
    model_id: phi-4-reasoning      # must match what LMStudio reports
    openai_base_url: http://localhost:1234/v1 # LMStudio default
    openai_api_key: lm-studio                # any string works
    temperature: 0.8
    top_p: 0.95

  - name: ministral-3-8B-Reasoning-2512
    model_id: ministral-3-8b-instruct-2512
    temperature: 1
    mistral_format: true
    backend: openai
    openai_base_url: http://localhost:1234/v1
    openai_api_key: lm-studio
    system_prompt: |
      # HOW YOU SHOULD THINK AND ANSWER
      First draft your thinking process (inner monologue) until you arrive at a response. Format your response using Markdown, and use LaTeX for any mathematical equations. Write both your thoughts and the response in the same language as the input.

      Your thinking process must follow the template below:
      [THINK]
      Your thoughts or/and draft, like working through an exercise on scratch paper. Be as casual and as long as you want until you are confident to generate the response to the user.
      [/THINK]
      Here, provide a self-contained response.

  - name: ministral-3-8B-Reasoning-2512-self-heretic
    model_id: ministral-3-8b-reasoning-2512-heretic_gguf
    tokenizer: mistralai/Ministral-3-8B-Reasoning-2512
    temperature: 1
    skip_datasets: [lima]
    mistral_format: true
    backend: openai
    openai_base_url: http://localhost:1234/v1
