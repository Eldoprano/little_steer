# ─────────────────────────────────────────────────────────────────────────────
# generate_responses.py — Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Run:  python generate_responses.py --config config.yaml
#       python generate_responses.py --config config.yaml --models qwen3-8b
#       python generate_responses.py --config config.yaml --calibrate-only

output_dir: "data"
hf_token_file: "../.secrets.json"   # JSON file with {"hf_token": "hf_..."}


# ── Default generation parameters ─────────────────────────────────────────────
# These apply to ALL models unless a model explicitly overrides them.
defaults:
  temperature: 0.6
  top_p: 0.95
  top_k: null          # null = disabled
  min_p: null          # null = disabled
  max_new_tokens: 3000
  quantization: null   # null = float16 as-is
                       # "4bit" or "8bit" = bitsandbytes quantization
                       # "auto" = try float16, fall back to bitsandbytes if OOM
                       # For pre-quantized HF models (AWQ/GPTQ): keep null,
                       # just point model_id at the quantized variant.
  # vLLM-specific settings
  gpu_memory_utilization: 1.0   # fraction of GPU VRAM to use (0.0–1.0)
  max_model_len: 8192            # cap context window length to save KV-cache memory
                                 # e.g. 8192 for 9B models on 16GB VRAM
  enforce_eager: true            # disable CUDA graphs — slightly slower but saves ~1GB VRAM


