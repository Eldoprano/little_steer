# labelers.yaml — Single source of truth for all labeler configurations.
#
# Shared defaults apply to every entry; each labeler overrides only what differs.
# Set enabled: false to disable a labeler without deleting it.
#
# Usage:
#   uv run run.py --config labelers.yaml ../../data/1_generated/   # all enabled
#   uv run run.py --config labelers.yaml --judge gpt-5.4-mini ../../data/1_generated/
#   uv run run_all.py ../../data/1_generated/                      # parallel launch

# ── Shared defaults ────────────────────────────────────────────────────────────
defaults:
  secrets_file: "../../.secrets.json"
  prompt_file: "prompt.md"
  system_prompt_file: "system_prompt.md"

  judge:
    temperature: 0.2
    timeout: 120

  pipeline:
    max_workers: 1
    max_retries: 2
    retry_delay: 15.0
    checkpoint_every: 10
    response_sentences: 10
    skip_no_reasoning: true
    skip_no_response: false
    overwrite_existing: false
    max_reasoning_chars: 8000
    work_order_file: "work_order.json"

  mapper:
    fuzzy_threshold: 0.85
    max_lookahead_multiplier: 5
    max_lookahead_min: 500

  output:
    dir: "../../data"
    in_place: false


# ── Labelers ───────────────────────────────────────────────────────────────────
labelers:

  # ── OpenAI ──────────────────────────────────────────────────────────────────
  - enabled: true
    judge:
      name: gpt-5.4-mini
      model_id: gpt-5.4-mini
      backend: openai
      api_key_source: openai-api-key
      max_completion_tokens: 8192
      logprobs: true
    pipeline:
      max_workers: 8
      max_retries: 2
      retry_delay: 2.0
      token_budget: 2500000
      budget_state_file: "_artifacts/gpt5mini_token_budget.json"
    output:
      suffix: "_gpt-5.4-mini"

  - enabled: true
    judge:
      name: gpt-5.4-2026-03-05
      model_id: gpt-5.4-2026-03-05
      backend: openai
      api_key_source: openai-api-key
      max_completion_tokens: 8192
      logprobs: true
      reasoning_effort: none
    pipeline:
      max_workers: 2
      max_retries: 2
      retry_delay: 5.0
      token_budget: 250000
      budget_state_file: "_artifacts/gpt5.4_token_budget.json"
    output:
      suffix: "_gpt-5.4-2026-03-05"

  - enabled: false
