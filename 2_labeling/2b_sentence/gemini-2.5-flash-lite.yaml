# ── Judge LLM backend ─────────────────────────────────────────────────────────
judge:
  name: gemini-2.5-flash-lite
  model_id: gemini-2.5-flash-lite
  backend: gemini
  base_url: https://generativelanguage.googleapis.com/v1beta/openai/
  api_key_source: gemini-free-api-key
  temperature: 0.2
  max_tokens: 8192
  timeout: 120
  rpm: 15     # free tier: 15 req/min
  rpd: null   # let the API decide — true limit unknown

secrets_file: "../../.secrets.json"
prompt_file: "prompt.md"

pipeline:
  max_retries: 5
  retry_delay: 8.0
  checkpoint_every: 10
  max_workers: 1
  response_sentences: 5
  skip_no_reasoning: true
  skip_no_response: false
  overwrite_existing: false
  max_reasoning_chars: null
  request_state_file: "gemini-2.5-flash-lite_requests.json"
  shuffle_files: true
  work_order_file: "work_order.json"

mapper:
  fuzzy_threshold: 0.85
  max_lookahead_multiplier: 5
  max_lookahead_min: 500

output:
  dir: "../../data/2b_labeled"
  suffix: "_gemini-2.5-flash-lite"
  in_place: false
