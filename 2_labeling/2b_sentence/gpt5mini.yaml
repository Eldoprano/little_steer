# ── Judge LLM backend ─────────────────────────────────────────────────────────
judge:
  name: gpt-5.4-mini
  model_id: gpt-5.4-mini
  backend: openai
  api_key_source: openai-api-key
  temperature: 0.2
  max_completion_tokens: 8192
  timeout: 120

# ── Secrets file (relative to this config file) ───────────────────────────────
secrets_file: "../../.secrets.json"

# ── Prompt template (relative to this config file) ────────────────────────────
prompt_file: "prompt.md"

# ── Pipeline settings ─────────────────────────────────────────────────────────
pipeline:
  max_retries: 3
  retry_delay: 2.0
  checkpoint_every: 10
  max_workers: 8
  response_sentences: 5
  skip_no_reasoning: true
  skip_no_response: false
  overwrite_existing: false
  max_reasoning_chars: null

  # ── Daily token budget ──────────────────────────────────────────────────────
  # Free tier: 2.5M tokens/day — resets at 00:00 UTC (19:00 Lima time).
  # The state file persists usage per UTC day; re-run same command to resume.
  token_budget: 2500000
  budget_state_file: "gpt5mini_token_budget.json"

  # ── Shared work order ───────────────────────────────────────────────────────
  # All judges target the same pre-selected entries in the same file order so
  # their outputs are directly comparable. Generated once by run_all.py.
  work_order_file: "work_order.json"

# ── Sentence mapping ──────────────────────────────────────────────────────────
mapper:
  fuzzy_threshold: 0.85
  max_lookahead_multiplier: 5
  max_lookahead_min: 500

# ── Output ────────────────────────────────────────────────────────────────────
output:
  dir: "../../data/2b_labeled"
  suffix: "_gpt-5.4-mini"
  in_place: false
